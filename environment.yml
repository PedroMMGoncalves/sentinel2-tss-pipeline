name: ocean_rs
channels:
  - conda-forge
  - defaults
dependencies:
  # Python 3.12 — MUST be pinned; 3.13+ breaks GDAL/fiona bindings
  - python=3.12.*

  # Core (required)
  - numpy
  - gdal>=3.0
  - psutil

  # Geometry (recommended for shapefile/GeoJSON support)
  - shapely
  - fiona
  - geopandas

  # SAR toolkit
  - scipy
  - h5py

  # Networking
  - requests
  - pip

  # IDE
  - spyder

  # NOTE: Do NOT add a pip: section here — it conflicts with system pip
  # on machines that have ArcGIS Pro or multiple Python installations.
  #
  # After creating the environment, install pip-only packages manually:
  #   python -m pip install sv-ttk asf_search python-dotenv tkintermapview snaphu
  #
  # Or use the automated installer:
  #   install_environment.bat
